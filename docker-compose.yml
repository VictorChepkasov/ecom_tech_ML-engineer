services:
  db:
    image: postgres:16
    container_name: grades_db
    restart: always
    environment:
      POSTGRES_DB: grades_db
      POSTGRES_USER: grades_user
      POSTGRES_PASSWORD: grades_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: 
      context: .
      network: host
    container_name: grades_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data: